name: "Publish"
# To trigger a release, create a new tag and push it to the repository:
# git tag -a v0.1.0 -m v0.1.0
# git push --tags
on:
  push:
    tags:
      - v*

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup UV
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        run: uv python install
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
